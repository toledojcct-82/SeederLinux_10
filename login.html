<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SeederLinux Lite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); }
        .login-card { max-width: 420px; margin: auto; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="login-card">
        <div class="card" style="background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(8px);">
            <div class="card-body text-center">
                <div class="mb-6">
                    <img src="assets/images/seederlinux-logo.png" alt="SeederLinux" style="max-height: 60px; margin: 0 auto;" onerror="this.src='assets/images/seederlinux-logo.svg'">
                </div>
                <h1 class="text-2xl font-bold mb-1">SeederLinux Lite</h1>
                <p class="text-slate-400 text-sm mb-6">Sistema de Gerenciamento de Estacoes</p>

                <form id="login-form">
                    <div class="form-group">
                        <label class="form-label">Usuario</label>
                        <input type="text" id="username" class="form-input" placeholder="Digite seu usuario" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Senha</label>
                        <input type="password" id="password" class="form-input" placeholder="Digite sua senha" required autocomplete="current-password">
                    </div>
                    <button type="submit" id="btn-login" class="btn btn-primary btn-lg w-full">
                        Entrar
                    </button>
                </form>

                <div id="error-message" class="hidden mt-4 p-3 rounded-lg" style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #f87171;"></div>
            </div>
        </div>

        <p class="text-center mt-6 text-slate-500 text-xs">
            SeederLinux Lite - Gerenciamento de Configuracoes
        </p>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-login');
            const errorEl = document.getElementById('error-message');

            if (!username || !password) {
                errorEl.textContent = 'Preencha todos os campos';
                errorEl.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Entrando...';
            errorEl.classList.add('hidden');

            try {
                const res = await API.post('login', { username, password });

                if (res.success) {
                    window.location.href = '/admin.html';
                } else {
                    errorEl.textContent = res.error || 'Credenciais invalidas';
                    errorEl.classList.remove('hidden');
                    btn.disabled = false;
                    btn.textContent = 'Entrar';
                }
            } catch (err) {
                errorEl.textContent = 'Erro de conexao. Tente novamente.';
                errorEl.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Entrar';
            }
        });

        // Check if already logged in
        (async () => {
            try {
                const res = await fetch('/api/?action=session', { credentials: 'same-origin' });
                const data = await res.json();
                if (data.success) {
                    window.location.href = '/admin.html';
                }
            } catch (e) {}
        })();
    </script>
</body>
</html>
